<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo de Nata</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a051a 0%, #000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px; /* Mayor profundidad */
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: none;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: -1;
        }

        .scene {
            position: relative;
            width: 0; height: 0;
            transform-style: preserve-3d;
            /* Zoom inicial ligeramente alejado para ver la esfera grande */
            transform: scale(0.9); 
        }

        /* --- CORAZÓN CENTRAL --- */
        .heart-3d {
            position: absolute;
            transform-style: preserve-3d;
        }

        .heart-layer {
            position: absolute;
            width: 50px; height: 50px;
            background: #ff2e63;
            transform: translate(-50%, -50%) rotate(-45deg);
            box-shadow: 0 0 30px #ff2e63;
        }
        .heart-layer::before, .heart-layer::after {
            content: '';
            position: absolute;
            width: 50px; height: 50px;
            background: #ff2e63;
            border-radius: 50%;
        }
        .heart-layer::before { top: -25px; left: 0; }
        .heart-layer::after { left: 25px; top: 0; }

        .heart-text {
            position: absolute;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            width: 220px;
            text-shadow: 0 0 15px rgba(0,0,0,1), 0 0 8px #ff2e63;
            transform: translate(-50%, -50%);
            z-index: 10000; 
            pointer-events: none;
        }

        /* --- PALABRAS --- */
        .word-item {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            font-size: 0.9rem; /* Un poco más grandes para leer mejor */
            transform-origin: center center;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .instruction {
            position: fixed;
            bottom: 15px;
            color: rgba(255,255,255,0.3);
            font-size: 9px;
            text-align: center;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="instruction">Usa dos dedos para alejar o acercar • Gira con un dedo</div>

    <div class="scene" id="mainScene">
        <div class="heart-3d" id="heartElement">
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg);"></div>
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg) translateZ(5px); opacity:0.8;"></div>
        </div>

        <div class="heart-text">Nata,<br>te quiero mucho</div>

        <div id="wordContainer"></div>
    </div>

    <script>
        const container = document.getElementById('wordContainer');
        const heartElement = document.getElementById('heartElement');
        const mainScene = document.getElementById('mainScene');
        
        const phrases = [
            "💕","Te quiero Nata", "Eres mi mundo", "Mi lugar favorito es contigo", "Eres arte",
            "Nata preciosa", "Te adoro", "Eres mi felicidad", "Tan bella",
            "Mi niña hermosa", "Eres magia", "Gracias por existir", "Eres luz",
            "Mi sol", "Mi tesoro", "Eres única", "Te quiero infinito",
            "Me encantas", "Siempre en mi mente", "Diosa", "Eres perfecta",
            "Mi corazón es tuyo", "Te quiero demasiado", "Increíble", "Eres dulzura",
            "Nata linda", "Te pienso siempre", "Eres mi alegría", "Quédate siempre",
            "Eres mi todo", "Te necesito", "Contigo siempre", "Nata mi vida","💕"
        ];

        let currentScale = 0.9;
        // RADIO MÁS GRANDE: Usamos un factor de 0.8 en lugar de 0.6 para que se expandan más
        let baseRadius = Math.min(window.innerWidth, window.innerHeight) * 0.85;
        
        // En PC el radio puede ser aún mayor
        if (window.innerWidth > 600) baseRadius = 450;

        const totalWords = 90; 
        const words = [];

        for (let i = 0; i < totalWords; i++) {
            const phi = Math.acos(-1 + (2 * i) / totalWords);
            const theta = Math.sqrt(totalWords * Math.PI) * phi;

            const x = baseRadius * Math.sin(phi) * Math.cos(theta);
            const y = baseRadius * Math.sin(phi) * Math.sin(theta);
            const z = baseRadius * Math.cos(phi);

            const el = document.createElement('div');
            el.className = 'word-item';
            el.innerText = phrases[i % phrases.length];
            el.style.color = (i % 2 === 0) ? "#ffffff" : "#ffb3b3";
            el.style.textShadow = "0 0 5px #ff2e63";
            
            container.appendChild(el);
            words.push({ el, x, y, z });
        }

        let angleY = 0;
        let angleX = 0;
        let heartSpin = 0;

        function animate() {
            angleY += 0.0015; // Un poco más lento para que sea más legible al girar
            heartSpin += 1;
            heartElement.style.transform = `rotateY(${heartSpin}deg)`;

            words.forEach(item => {
                const cosY = Math.cos(angleY);
                const sinY = Math.sin(angleY);
                const cosX = Math.cos(angleX);
                const sinX = Math.sin(angleX);

                let x1 = item.x * cosY - item.z * sinY;
                let z1 = item.z * cosY + item.x * sinY;
                let y1 = item.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + item.y * sinX;

                item.el.style.transform = `translate3d(${x1}px, ${y1}px, ${z2}px)`;
                
                // Opacidad mejorada para que las de atrás no estorben
                const depthScale = (z2 + baseRadius) / (2 * baseRadius);
                item.el.style.opacity = 0.05 + (depthScale * 0.95);
                item.el.style.zIndex = Math.round(z2);
            });

            mainScene.style.transform = `scale(${currentScale})`;

            requestAnimationFrame(animate);
        }

        let initialDist = 0;
        let startX = 0, startY = 0;

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            } else {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const currentDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const zoomFactor = currentDist / initialDist;
                currentScale = Math.min(Math.max(currentScale * zoomFactor, 0.3), 2.0);
                initialDist = currentDist;
            } else {
                const deltaX = e.touches[0].clientX - startX;
                const deltaY = e.touches[0].clientY - startY;
                angleY += deltaX * 0.0001;
                angleX -= deltaY * 0.0001;
            }
        }, { passive: false });

        document.addEventListener('wheel', (e) => {
            currentScale += e.deltaY * -0.001;
            currentScale = Math.min(Math.max(currentScale, 0.3), 2.0);
        });

        animate();
    </script>
</body>
</html>
