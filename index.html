<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo de Nata</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a051a 0%, #000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            font-family: sans-serif;
            color: white;
            touch-action: none;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: -1;
        }

        .scene {
            position: relative;
            width: 0; height: 0;
            transform-style: preserve-3d;
        }

        /* --- CORAZÓN CENTRAL --- */
        .heart-3d {
            position: absolute;
            transform-style: preserve-3d;
        }

        .heart-layer {
            position: absolute;
            width: 50px; height: 50px;
            background: #ff2e63;
            transform: translate(-50%, -50%) rotate(-45deg);
            box-shadow: 0 0 20px #ff2e63;
        }
        .heart-layer::before, .heart-layer::after {
            content: '';
            position: absolute;
            width: 50px; height: 50px;
            background: #ff2e63;
            border-radius: 50%;
        }
        .heart-layer::before { top: -25px; left: 0; }
        .heart-layer::after { left: 25px; top: 0; }

        .heart-text {
            position: absolute;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            text-align: center;
            width: 120px;
            text-shadow: 0 0 8px #000;
            transform: translate(-50%, -50%);
            z-index: 5000;
            pointer-events: none;
        }

        /* --- PALABRAS --- */
        .word-item {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            font-size: 0.75rem; /* Tamaño optimizado para pantallas pequeñas */
            transform-origin: center center;
            pointer-events: none;
            /* Forzar hardware acceleration */
            will-change: transform, opacity;
        }

        .instruction {
            position: fixed;
            bottom: 15px;
            color: rgba(255,255,255,0.5);
            font-size: 9px;
            text-align: center;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="instruction">Desliza para girar el universo de Nata</div>

    <div class="scene" id="mainScene">
        <div class="heart-3d" id="heartElement">
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg);"></div>
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg) translateZ(5px); opacity:0.8;"></div>
        </div>

        <div class="heart-text">Nata,<br>te quiero mucho</div>

        <div id="wordContainer"></div>
    </div>

    <script>
        const container = document.getElementById('wordContainer');
        const heartElement = document.getElementById('heartElement');
        
        const phrases = [
            "Eres preciosa", "Inspiras belleza", "Bella", "Diosa",
            "Mágica Nata", "Eres luz", "Dulzura", "Encantadora", 
            "Eres única", "Increíble Nata", "Valiente", 
            "Mi tesoro", "Diosa Nata", "Paz", "Mi orgullo",
            "Te quiero mucho", "Me encantas", "Me gustas", "Te adoro", 
            "Me haces feliz", "Siempre contigo", "Eres mi sol", "Te amo",
            "Nata eres magia", "Eres capaz", "Te mereces lo mejor"
        ];

        // --- CÁLCULO PARA PANTALLAS PEQUEÑAS ---
        const screenWidth = window.innerWidth;
        // El radio será máximo 140px en celulares pequeños y hasta 300px en PC
        const radius = Math.min(screenWidth * 0.4, 300);
        const totalWords = screenWidth < 400 ? 50 : 90; // Menos palabras en pantallas mini para evitar caos
        
        const words = [];

        for (let i = 0; i < totalWords; i++) {
            const phi = Math.acos(-1 + (2 * i) / totalWords);
            const theta = Math.sqrt(totalWords * Math.PI) * phi;

            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);

            const el = document.createElement('div');
            el.className = 'word-item';
            el.innerText = phrases[i % phrases.length];
            el.style.color = (i % 2 === 0) ? "#fff" : "#ffb3b3";
            el.style.textShadow = "0 0 5px #ff2e63";
            
            container.appendChild(el);
            words.push({ el, x, y, z });
        }

        let angleY = 0;
        let angleX = 0;
        let heartSpin = 0;

        function animate() {
            angleY += 0.003; 
            heartSpin += 1;

            heartElement.style.transform = `rotateY(${heartSpin}deg)`;

            words.forEach(item => {
                const cosY = Math.cos(angleY);
                const sinY = Math.sin(angleY);
                const cosX = Math.cos(angleX);
                const sinX = Math.sin(angleX);

                let x1 = item.x * cosY - item.z * sinY;
                let z1 = item.z * cosY + item.x * sinY;
                let y1 = item.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + item.y * sinX;

                // Solo traslación: las letras NUNCA giran sobre sí mismas
                // así nunca se ven de perfil ni al revés.
                item.el.style.transform = `translate3d(${x1}px, ${y1}px, ${z2}px)`;
                
                // Ajustar escala y opacidad según profundidad
                const depthScale = (z2 + radius) / (2 * radius);
                item.el.style.opacity = 0.2 + (depthScale * 0.8);
                item.el.style.zIndex = Math.round(z2 + 500);
            });

            requestAnimationFrame(animate);
        }

        // Interacción táctil suave
        let startX = 0;
        let startY = 0;

        document.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            angleY += deltaX * 0.0001;
            angleX -= deltaY * 0.0001;
        }, { passive: false });

        animate();
    </script>
</body>
</html>
