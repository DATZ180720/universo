<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universo de Nata</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1a051a 0%, #000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: none;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: -1;
        }

        .scene {
            position: relative;
            width: 0; height: 0;
            transform-style: preserve-3d;
        }

        /* --- CORAZÓN CENTRAL --- */
        .heart-3d {
            position: absolute;
            transform-style: preserve-3d;
        }

        .heart-layer {
            position: absolute;
            width: 50px; height: 50px;
            background: #ff2e63;
            transform: translate(-50%, -50%) rotate(-45deg);
            box-shadow: 0 0 25px #ff2e63;
        }
        .heart-layer::before, .heart-layer::after {
            content: '';
            position: absolute;
            width: 50px; height: 50px;
            background: #ff2e63;
            border-radius: 50%;
        }
        .heart-layer::before { top: -25px; left: 0; }
        .heart-layer::after { left: 25px; top: 0; }

        /* EL MENSAJE PRINCIPAL - SIEMPRE VISIBLE */
        .heart-text {
            position: absolute;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            width: 180px;
            /* El truco del z-index extremo y sombras para legibilidad */
            text-shadow: 0 0 10px #000, 0 0 20px #000, 0 0 5px #ff2e63;
            transform: translate(-50%, -50%);
            z-index: 99999; 
            pointer-events: none;
        }

        /* --- PALABRAS ORBITANTES --- */
        .word-item {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            font-size: 0.8rem;
            transform-origin: center center;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .instruction {
            position: fixed;
            bottom: 15px;
            color: rgba(255,255,255,0.4);
            font-size: 9px;
            text-align: center;
            width: 100%;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="instruction">Toca para mover el universo de Nata</div>

    <div class="scene" id="mainScene">
        <div class="heart-3d" id="heartElement">
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg);"></div>
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg) translateZ(5px); opacity:0.8;"></div>
            <div class="heart-layer" style="transform: translate(-50%, -50%) rotate(-45deg) translateZ(-5px); opacity:0.8;"></div>
        </div>

        <div class="heart-text">Nata,<br>te quiero mucho</div>

        <div id="wordContainer"></div>
    </div>

    <script>
        const container = document.getElementById('wordContainer');
        const heartElement = document.getElementById('heartElement');
        
        const phrases = [
            "Te quiero Nata", "Eres mi mundo", "Mi lugar favorito es contigo", "Eres arte",
            "Nata preciosa", "Te adoro", "Eres mi felicidad", "Tan bella",
            "Mi niña hermosa", "Eres magia", "Gracias por existir", "Eres luz",
            "Mi sol", "Mi tesoro", "Eres única", "Te amo infinito",
            "Nata, eres mi sueño", "Me encantas", "Siempre en mi mente", "Diosa",
            "Eres perfecta", "Mi corazón es tuyo", "Te quiero demasiado", "Increíble",
            "Inspiras amor", "Eres dulzura", "Mi Nata linda", "Eres mi todo",
            "Te pienso siempre", "Eres mi alegría", "Eres maravillosa", "Nata, te amo",
            "Tu sonrisa me mata", "Eres mi paz", "Eres mi motivación", "Eres especial",
            "No hay nadie como tú", "Eres mi vida", "Quédate siempre", "Nata mágica",
            "Eres mi estrella", "Te quiero ver feliz", "Eres mi orgullo", "Bonita"
        ];

        const screenWidth = window.innerWidth;
        const screenHeight = window.innerHeight;
        
        // Ajustamos el radio para que ocupe gran parte de la pantalla pero sin salirse
        const radius = Math.min(screenWidth, screenHeight) * 0.45;
        // Aumentamos la cantidad para que se vea muy lleno
        const totalWords = screenWidth < 500 ? 150 : 250; 
        
        const words = [];

        for (let i = 0; i < totalWords; i++) {
            const phi = Math.acos(-1 + (2 * i) / totalWords);
            const theta = Math.sqrt(totalWords * Math.PI) * phi;

            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);

            const el = document.createElement('div');
            el.className = 'word-item';
            // Repetimos las frases mezcladas
            el.innerText = phrases[i % phrases.length];
            
            // Colores variados entre blanco y rosados
            const colors = ["#ffffff", "#ffb3b3", "#ffccd5", "#fff0f3"];
            el.style.color = colors[i % colors.length];
            el.style.textShadow = "0 0 5px #ff2e63";
            
            container.appendChild(el);
            words.push({ el, x, y, z });
        }

        let angleY = 0;
        let angleX = 0;
        let heartSpin = 0;

        function animate() {
            angleY += 0.002; // Rotación lenta automática
            heartSpin += 1;

            heartElement.style.transform = `rotateY(${heartSpin}deg)`;

            words.forEach(item => {
                const cosY = Math.cos(angleY);
                const sinY = Math.sin(angleY);
                const cosX = Math.cos(angleX);
                const sinX = Math.sin(angleX);

                let x1 = item.x * cosY - item.z * sinY;
                let z1 = item.z * cosY + item.x * sinY;
                let y1 = item.y * cosX - z1 * sinX;
                let z2 = z1 * cosX + item.y * sinX;

                // Aplicamos posición 3D
                item.el.style.transform = `translate3d(${x1}px, ${y1}px, ${z2}px)`;
                
                // Efecto de profundidad
                const depthScale = (z2 + radius) / (2 * radius);
                item.el.style.opacity = 0.15 + (depthScale * 0.85);
                
                // Las palabras de adelante se ven un poco más grandes
                const sizeScale = 0.7 + (depthScale * 0.5);
                item.el.style.fontSize = `${sizeScale}rem`;
                
                // Z-index para orden de capas
                item.el.style.zIndex = Math.round(z2 + 1000);
            });

            requestAnimationFrame(animate);
        }

        // Interacción manual suave para celular
        let startX = 0, startY = 0;
        document.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            angleY += deltaX * 0.00005;
            angleX -= deltaY * 0.00005;
        }, { passive: false });

        animate();
    </script>
</body>
</html>
